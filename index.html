<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEO 3 UNRESTRICTED - Final Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-black text-slate-100 min-h-screen p-4 flex flex-col justify-between">

    <header class="max-w-xl mx-auto w-full border-b border-zinc-900 pb-4 mb-6 flex justify-between items-center">
        <h1 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-amber-400">VEO 3 STUDIO</h1>
        <span class="text-[10px] bg-purple-500/10 text-purple-400 border border-purple-500/20 px-2 py-0.5 rounded-full font-mono">DIRECT API</span>
    </header>

    <main class="max-w-xl mx-auto w-full flex-1 space-y-6">
        
        <div class="space-y-2">
            <label class="block text-xs font-bold text-zinc-400 uppercase tracking-wider">Dán kịch bản / Prompt tiếng Anh vào đây:</label>
            <textarea id="promptArea" rows="5" class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl p-4 text-sm text-slate-200 focus:outline-none focus:border-purple-500 transition shadow-inner" placeholder="A young Vietnamese man livestreaming, vertical 9:16, cinematic..."></textarea>
        </div>

        <button id="actionBtn" onclick="generateVideoAI()" class="w-full py-4 bg-gradient-to-r from-purple-600 via-violet-600 to-amber-500 text-white font-bold rounded-2xl shadow-lg transition active:scale-95 flex items-center justify-center gap-2">
            <span>🎬 BẮT ĐẦU TẠO VIDEO AI</span>
        </button>

        <div class="border border-zinc-900 bg-zinc-950/40 rounded-3xl p-4 min-h-[220px] flex items-center justify-center relative overflow-hidden">
            
            <div id="statusPlaceholder" class="text-xs text-zinc-600 font-mono">Chưa có video. Hãy điền kịch bản rồi bấm tạo.</div>

            <div id="loadingSpinner" class="hidden flex flex-col items-center justify-center space-y-3 text-center">
                <div class="w-8 h-8 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div>
                <div class="text-xs font-bold text-amber-400">AI đang xử lý phim thô...</div>
                <p class="text-[10px] text-zinc-500">Mất tầm 30 giây đến 1 phút. Đừng thoát trang nhé.</p>
            </div>

            <video id="videoPlayer" class="hidden w-full rounded-xl border border-zinc-800 shadow-2xl" controls loop autoplay muted></video>
        </div>

    </main>

    <footer class="text-center text-[10px] text-zinc-700 py-6 font-mono">
        Giao diện tạo video trực tiếp không dùng khung nhúng iframe.
    </footer>

    <script>
        async function generateVideoAI() {
            const text = document.getElementById("promptArea").value.trim();
            const btn = document.getElementById("actionBtn");
            const placeholder = document.getElementById("statusPlaceholder");
            const loading = document.getElementById("loadingSpinner");
            const player = document.getElementById("videoPlayer");

            if (!text) {
                alert("Bạn chưa dán chữ kịch bản kìa!");
                return;
            }

            // Kích hoạt giao diện chờ
            btn.disabled = true;
            btn.opacity = "0.5";
            btn.innerText = "⚡ ĐANG XỬ LÝ FILE...";
            placeholder.classList.add("hidden");
            player.classList.add("hidden");
            loading.classList.remove("hidden");

            try {
                // Sử dụng đường dẫn API mở xử lý không qua cổng lọc iframe
                const res = await fetch("https://bytedance-animatediff.hf.space/api/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ data: [text, "worst quality", 16, 8] })
                });

                if (!res.ok) throw new Error();

                const output = await res.json();
                
                // Trích xuất file video từ mảng kết quả của server
                if (output && output.data && output.data[0]) {
                    const videoUrl = output.data[0].orig_name ? `https://bytedance-animatediff.hf.space/file=${output.data[0].name}` : output.data[0];

                    // Hiển thị kết quả lên màn hình
                    loading.classList.add("hidden");
                    player.src = videoUrl;
                    player.classList.remove("hidden");
                    player.load();
                    player.play();
                } else {
                    throw new Error();
                }

            } catch (e) {
                alert("Máy chủ AI đang nhận nhiều yêu cầu. Bạn bấm nút tạo lại lần nữa nha!");
                loading.classList.add("hidden");
                placeholder.classList.remove("hidden");
            } finally {
                btn.disabled = false;
                btn.opacity = "1";
                btn.innerText = "🎬 BẮT ĐẦU TẠO VIDEO AI";
            }
        }
    </script>
</body>
</html>
