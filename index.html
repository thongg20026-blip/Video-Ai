<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Generator - Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-md w-full bg-gray-800 p-6 rounded-2xl shadow-xl border border-gray-700">
        <h1 class="text-2xl font-bold mb-6 text-center text-indigo-400">AI Video Infinite (iOS)</h1>
        
        <!-- Ô dán link API Cloud -->
        <div class="mb-4">
            <label class="block text-xs font-medium mb-1 text-gray-400">Cấu hình API URL (Từ Colab/RunPod):</label>
            <input type="text" id="apiUrl" class="w-full p-2 bg-gray-700 rounded-lg border border-gray-600 text-sm focus:outline-none focus:border-indigo-500" placeholder="https://xxxx.ngrok-free.app">
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Nhập mô tả kịch bản:</label>
            <textarea id="prompt" rows="3" class="w-full p-3 bg-gray-700 rounded-lg border border-gray-600 text-sm focus:outline-none" placeholder="Ví dụ: Một phi hành gia trên sao hỏa..."></textarea>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium mb-1">Thời lượng (giây):</label>
            <input type="number" id="duration" value="30" class="w-full p-3 bg-gray-700 rounded-lg border border-gray-600 text-sm">
        </div>

        <button onclick="generateVideo()" id="generateBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 py-3 rounded-lg font-bold transition">
            Bắt Đầu Tạo Video
        </button>

        <div id="status" class="mt-4 text-center text-sm text-indigo-300 hidden">Đang xử lý trên Cloud... Vui lòng đợi...</div>
        
        <div id="resultContainer" class="mt-6 hidden">
            <video id="videoResult" controls class="w-full rounded-lg border border-gray-700 shadow-lg"></video>
            <a id="downloadBtn" href="#" download="ai-video.mp4" class="block text-center mt-4 bg-green-600 py-2 rounded-lg font-medium">Tải Video Về iPhone</a>
        </div>
    </div>

    <script>
        async function generateVideo() {
            const prompt = document.getElementById('prompt').value;
            const duration = document.getElementById('duration').value;
            const apiUrl = document.getElementById('apiUrl').value.trim();
            
            if(!prompt || !apiUrl) return alert("Vui lòng nhập đầy đủ Prompt và API URL!");

            const btn = document.getElementById('generateBtn');
            const status = document.getElementById('status');
            const resultContainer = document.getElementById('resultContainer');
            
            btn.disabled = true;
            status.classList.remove('hidden');
            resultContainer.classList.add('hidden');

            try {
                // Gọi tới link Cloud API bạn dán vào
                const response = await fetch(`${apiUrl}/api/v1/generate-infinite`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt, total_duration_seconds: parseInt(duration) })
                });
                
                const data = await response.json();
                if(data.success) {
                    document.getElementById('videoResult').src = data.video_url;
                    document.getElementById('downloadBtn').href = data.video_url;
                    resultContainer.classList.remove('hidden');
                } else {
                    alert("Lỗi: " + data.error);
                }
            } catch (error) {
                alert("Không thể kết nối đến Cloud Server. Hãy kiểm tra lại link API URL.");
            } finally {
                btn.disabled = false;
                status.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
