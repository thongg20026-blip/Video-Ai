<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEO 3 Unrestricted - Fix API</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client@1.8.1/dist/index.min.js";
        window.GradioClient = Client;
    </script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between">

    <header class="border-b border-slate-900 bg-slate-900/40 p-4 sticky top-0 backdrop-blur-md z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-amber-400">VEO 3 UNRESTRICTED</h1>
            <span class="text-xs bg-emerald-500/10 text-emerald-400 px-2.5 py-1 rounded-full border border-emerald-500/20">Hệ thống Đang chạy</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 py-8 w-full flex-1 grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div class="space-y-6 bg-slate-900/30 p-6 rounded-3xl border border-slate-900">
            <div>
                <label class="block text-sm font-bold text-purple-400 mb-2">1. Nhập mô tả phân cảnh bằng tiếng Anh:</label>
                <textarea id="promptInput" rows="5" class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 text-sm text-slate-200 focus:outline-none focus:border-purple-500 transition font-sans" placeholder="A young Vietnamese man livestreaming, expressive face, vertical 9:16..."></textarea>
            </div>

            <button id="generateBtn" onclick="generateVideo()" class="w-full py-4 bg-gradient-to-r from-purple-600 to-amber-500 text-white font-bold rounded-2xl shadow-lg transition active:scale-98 flex items-center justify-center">
                <span id="btnText">🎬 BẮT ĐẦU TẠO VIDEO AI</span>
            </button>
        </div>

        <div class="flex flex-col justify-between bg-black p-6 rounded-3xl border border-slate-900">
            <div>
                <span class="text-xs font-mono text-slate-500 block mb-3">🖥️ BÀN DỰNG HOÀN THÀNH:</span>
                
                <div id="loadingState" class="hidden flex-col items-center justify-center space-y-4 py-20 text-center">
                    <div class="w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
                    <p class="text-sm text-purple-400 font-medium">AI đang dựng video...<br><span class="text-xs text-slate-500">(Quá trình mất 1-2 phút, vui lòng chờ)</span></p>
                </div>

                <video id="videoResult" class="w-full rounded-2xl border border-slate-900 shadow-2xl hidden" controls loop autoplay muted></video>
            </div>

            <div class="mt-4 hidden" id="downloadArea">
                <a id="downloadBtn" href="#" download="video.mp4" target="_blank" class="w-full py-2.5 bg-slate-900 hover:bg-slate-800 border border-slate-800 rounded-xl text-xs font-bold text-center block text-emerald-400">
                    📥 Tải Video Xuống Điện Thoại
                </a>
            </div>
        </div>
    </main>

    <script>
        async function generateVideo() {
            const prompt = document.getElementById("promptInput").value.trim();
            const btn = document.getElementById("generateBtn");
            const btnText = document.getElementById("btnText");
            const loading = document.getElementById("loadingState");
            const video = document.getElementById("videoResult");
            const dlArea = document.getElementById("downloadArea");
            const dlBtn = document.getElementById("downloadBtn");

            if (!prompt) {
                alert("Vui lòng nhập mô tả kịch bản!");
                return;
            }

            btn.disabled = true;
            btnText.innerText = "⚡ ĐANG XỬ LÝ...";
            video.classList.add("hidden");
            loading.classList.remove("hidden");
            dlArea.classList.add("hidden");

            try {
                // Đổi sang không gian chạy mô hình Mochi-1 hoặc LTX ổn định hơn
                const client = await window.GradioClient.connect("fffiloni/maccs-video-gen");
                
                //
