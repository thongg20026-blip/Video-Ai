<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEO 3 UNRESTRICTED - Core Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;850&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-black text-slate-100 min-h-screen">

    <header class="border-b border-slate-900 bg-slate-950/80 sticky top-0 backdrop-blur-md z-50 p-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-lg font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-amber-400">VEO 3 UNRESTRICTED</h1>
            <span class="text-xs bg-purple-500/10 text-purple-400 px-2 py-0.5 rounded border border-purple-500/20 font-mono">STABLE API</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 py-8 w-full grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div class="space-y-6 bg-slate-900/20 p-6 rounded-3xl border border-slate-900">
            <div>
                <label class="block text-xs font-bold text-purple-400 mb-2 uppercase">Nhập mô tả video (Tiếng Anh):</label>
                <textarea id="promptInput" rows="4" class="w-full bg-black border border-slate-800 rounded-2xl p-4 text-sm text-slate-200 focus:outline-none focus:border-purple-500 transition" placeholder="A young Vietnamese man livestreaming, dynamic movement, vertical 9:16..."></textarea>
            </div>

            <button id="generateBtn" onclick="startAiGeneration()" class="w-full py-4 bg-gradient-to-r from-purple-600 to-amber-500 text-white font-bold rounded-2xl shadow-lg transition active:scale-95 flex items-center justify-center gap-2">
                🎬 BẮT ĐẦU TẠO VIDEO AI
            </button>
        </div>

        <div class="flex flex-col justify-between bg-zinc-950 p-6 rounded-3xl border border-slate-900 min-h-[300px]">
            <div class="h-full flex flex-col justify-center items-center relative">
                
                <div id="loadingBox" class="hidden flex flex-col items-center justify-center space-y-4 text-center">
                    <div class="w-10 h-10 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div>
                    <div class="text-sm font-bold text-amber-400">Hệ thống đang xử lý phân cảnh...</div>
                    <p class="text-xs text-slate-500 max-w-xs">Thời gian render từ 30s đến 1 phút. Vui lòng giữ màn hình điện thoại luôn sáng.</p>
                </div>
                
                <video id="videoBox" class="w-full rounded-2xl border border-slate-900 shadow-2xl" controls loop autoplay muted></video>
                
            </div>
        </div>
    </main>

    <script>
        async function startAiGeneration() {
            const promptText = document.getElementById("promptInput").value.trim();
            const btn = document.getElementById("generateBtn");
            const loading = document.getElementById("loadingBox");
            const video = document.getElementById("videoBox");

            if (!promptText) {
                alert("Vui lòng gõ nội dung kịch bản vào ô trống!");
                return;
            }

            // Kích hoạt giao diện chờ đợi trực quan, ẩn màn hình đen
            btn.disabled = true;
            btn.classList.add("opacity-50");
            btn.innerText = "⚡ ĐANG RENDER VIDEO...";
            video.classList.add("hidden");
            loading.classList.remove("hidden");

            try {
                // Sử dụng API cổng mở trực tiếp xử lý dữ liệu JSON (không qua thư viện trung gian)
                const response = await fetch("https://kingnish-instant-video.hf.space/call/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        data: [promptText, 0] // Truyền lệnh prompt chữ và seed tự động
                    ])
                });

                if (!response.ok) throw new Error("Mất kết nối máy chủ");
                
                const jsonResult = await response.json();
                const eventId = jsonResult.event_id;

                // Tạo vòng lặp kiểm tra tiến trình của máy ảo cho đến khi đẻ xong file video
                const checkStatus = setInterval(async () => {
                    const statusResponse = await fetch(`https://kingnish-instant-video.hf.space/call/predict/${eventId}`);
                    const textData = await statusResponse.text();

                    // Khi máy ảo gửi tín hiệu hoàn thành (complete) kèm đường dẫn file
                    if (textData.includes('"complete"')) {
                        clearInterval(checkStatus);
                        
                        // Lọc tìm đường link chứa đuôi video .mp4 từ dữ liệu trả về
                        const match = textData.match(/https:\/\/.*?\.mp4/);
                        if (match && match[0]) {
                            const finalVideoUrl = match[0].replace(/\\/g, '');

                            // Tắt màn hình loading, hiển thị và tự động phát video thành phẩm
                            loading.classList.add("hidden");
                            video.src = finalVideoUrl;
                            video.classList.remove("hidden");
                            video.load();
                            video.play();

                            // Khôi phục nút bấm ban đầu
                            btn.disabled = false;
                            btn.classList.remove("opacity-50");
                            btn.innerText = "🎬 BẮT ĐẦU TẠO VIDEO AI";
                        }
                    } else if (textData.includes('"error"')) {
                        clearInterval(checkStatus);
                        alert("Máy chủ đang bận xử lý yêu cầu khác, bạn hãy nhấn lại lần nữa nhé!");
                        loading.classList.add("hidden");
                        video.classList.remove("hidden");
                        btn.disabled = false;
                        btn.classList.remove("opacity-50");
                        btn.innerText = "🎬 BẮT ĐẦU TẠO VIDEO AI";
                    }
                }, 2000); // Cứ mỗi 2 giây gửi lệnh kiểm tra tiến độ 1 lần

            } catch (err) {
                console.error(err);
                alert("Đường truyền mạng trên iPhone bị ngắt quãng. Hãy nhấn nút tạo lại nhé!");
                loading.classList.add("hidden");
                video.classList.remove("hidden");
                btn.disabled = false;
                btn.classList.remove("opacity-50");
                btn.innerText = "🎬 BẮT ĐẦU TẠO VIDEO AI";
            }
        }
    </script>
</body>
</html>
